<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom Observer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; border: 2px solid transparent; background-clip: padding-box; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            width: 24px; height: 24px; border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [state, setState] = useState(null);
            const [gallery, setGallery] = useState(null);
            const [visiblePatches, setVisiblePatches] = useState({});
            const [patchContents, setPatchContents] = useState({});
            
            const openGallery = (images, index = 0) => {
                setGallery({ images: images.filter(Boolean), index });
            };

            const closeGallery = () => setGallery(null);

            const nextImage = (e) => {
                e.stopPropagation();
                if (gallery) {
                    setGallery({ ...gallery, index: (gallery.index + 1) % gallery.images.length });
                }
            };

            const prevImage = (e) => {
                e?.stopPropagation();
                if (gallery) {
                    setGallery((prev) => ({ ...prev, index: (prev.index - 1 + prev.images.length) % prev.images.length }));
                }
            };
            
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!gallery) return;
                    if (e.key === 'ArrowRight') nextImage();
                    if (e.key === 'ArrowLeft') prevImage();
                    if (e.key === 'Escape') closeGallery();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gallery]);
            
            const logContainerRef = useRef(null);
            const mainContainerRef = useRef(null);
            const isScrolledUpLogs = useRef(false);
            const isScrolledUpMain = useRef(false);

            const fetchState = async () => {
                try {
                    const res = await fetch(`/session_state.json?t=${new Date().getTime()}`);
                    if (!res.ok) throw new Error("State file not found");
                    const text = await res.text();
                    if (!text || text.trim() === "") return; 
                    const data = JSON.parse(text);
                    if (data && data.history) {
                        setState(data);
                    }
                } catch (e) {
                    console.warn("Fetch state error:", e.message);
                }
            };

            useEffect(() => {
                fetchState();
                const interval = setInterval(fetchState, 2000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!isScrolledUpLogs.current && logContainerRef.current) {
                    logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
                }
            }, [state?.live_logs]);

            useEffect(() => {
                if (!isScrolledUpMain.current && mainContainerRef.current) {
                    mainContainerRef.current.scrollTop = mainContainerRef.current.scrollHeight;
                }
            }, [state]);

            const togglePatch = async (patchPath) => {
                if (visiblePatches[patchPath]) {
                    setVisiblePatches(prev => ({ ...prev, [patchPath]: false }));
                    return;
                }
                setVisiblePatches(prev => ({ ...prev, [patchPath]: true }));
                if (!patchContents[patchPath]) {
                    try {
                        const res = await fetch(`/viewer/public/${patchPath}`);
                        const text = await res.text();
                        setPatchContents(prev => ({ ...prev, [patchPath]: text }));
                    } catch (e) {
                        setPatchContents(prev => ({ ...prev, [patchPath]: "Failed to load patch file." }));
                    }
                }
            };

            if (!state) return <div className="p-8 text-center text-slate-400">Waiting for Loom Factory to start...</div>;

            return (
                <div className="h-screen flex flex-col bg-[#0f172a] text-slate-200 overflow-hidden">
                    {gallery && gallery.images && gallery.images.length > 0 && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-4" onClick={closeGallery}>
                            <img src={gallery.images[gallery.index]} className="max-w-full max-h-full object-contain rounded-lg shadow-2xl" onClick={(e) => e.stopPropagation()} />
                            
                            {gallery.images.length > 1 && (
                                <>
                                    <button onClick={prevImage} className="absolute left-6 top-1/2 -translate-y-1/2 bg-slate-800/80 text-white rounded-full w-12 h-12 flex items-center justify-center hover:bg-slate-700 border border-slate-600 text-3xl font-bold backdrop-blur transition-all hover:scale-110">&lsaquo;</button>
                                    <button onClick={nextImage} className="absolute right-6 top-1/2 -translate-y-1/2 bg-slate-800/80 text-white rounded-full w-12 h-12 flex items-center justify-center hover:bg-slate-700 border border-slate-600 text-3xl font-bold backdrop-blur transition-all hover:scale-110">&rsaquo;</button>
                                </>
                            )}
                            
                            <button onClick={closeGallery} className="absolute top-6 right-6 bg-slate-800/80 text-white rounded-full w-12 h-12 flex items-center justify-center hover:bg-slate-700 border border-slate-600 text-xl font-bold backdrop-blur">X</button>
                            
                            {gallery.images.length > 1 && (
                                <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-slate-800/80 px-4 py-2 rounded-full border border-slate-600 text-xs font-bold tracking-widest text-slate-300 backdrop-blur">
                                    {gallery.index + 1} / {gallery.images.length}
                                </div>
                            )}
                        </div>
                    )}

                    <header className="bg-slate-900 border-b border-slate-800 p-4 shadow-md z-10 shrink-0 flex items-center justify-between">
                        <div>
                            <div className="flex items-center gap-3">
                                <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Project Loom</h1>
                                {state.active_branch && <span className="bg-slate-800 text-slate-400 border border-slate-700 text-[10px] px-2 py-0.5 rounded font-mono flex items-center gap-1"><span className="text-blue-400">⎇</span> {state.active_branch}</span>}
                            </div>
                            <p className="text-slate-400 text-xs mt-1">{state.project_name} - Iteration {state.current_iteration}</p>
                        </div>
                        <div className="flex items-center gap-4">
                            {state.current_phase && <div className="text-xs font-bold text-slate-500 uppercase tracking-widest bg-slate-800/50 px-3 py-1 rounded-lg border border-slate-700/50">{state.current_phase}</div>}
                            <div className="flex items-center gap-3 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                                <div className="spinner"></div>
                                <span className="text-xs font-medium text-blue-300">{state.current_status}</span>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto w-full" onScroll={(e) => { isScrolledUpMain.current = e.target.scrollHeight - e.target.scrollTop - e.target.clientHeight > 100; }} ref={mainContainerRef}>
                        <main className="w-[95%] max-w-[1800px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-8 pb-12">
                            <div className="lg:col-span-1 space-y-6 md:sticky md:top-6 max-h-[calc(100vh-350px)] overflow-y-auto pr-2">
                                {state.app_meta && (
                                    <div className="bg-slate-900/50 border border-slate-800 rounded-xl p-4 mb-4">
                                        <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 bg-fuchsia-500 rounded-full"></span>
                                            Product Identity
                                        </h2>
                                        <p className="text-[10px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap">{state.app_meta}</p>
                                    </div>
                                )}
                                {(state.product_phase || state.product_roadmap) && (
                                    <div className="bg-slate-900/50 border border-slate-800 rounded-xl p-4 mb-8">
                                        <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                                            Roadmap Phase
                                        </h2>
                                        {state.product_phase && <div className="text-xs font-bold text-emerald-400 mb-2">{state.product_phase}</div>}
                                        {state.product_roadmap && <p className="text-[10px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap">{state.product_roadmap}</p>}
                                    </div>
                                )}
                                <h2 className="text-lg font-semibold tracking-wider uppercase text-sm mb-4">Build Timeline</h2>
                                <div className="space-y-6">
                                    {[...state.history].reverse().map((iter) => (
                                        <div key={iter.id} className={`pl-4 border-l-2 ${iter.id === state.current_iteration ? 'border-blue-500' : 'border-slate-800'}`}>
                                            <div className="flex justify-between items-start mb-1">
                                                <div className="flex flex-col items-start gap-1">
                                                    <button onClick={() => document.getElementById(`iter-${iter.id}`)?.scrollIntoView({ behavior: 'smooth' })} className={`font-bold text-sm hover:underline text-left ${iter.id === state.current_iteration ? 'text-blue-400' : 'text-slate-300'}`}>
                                                        {iter.id === 1 ? 'Genesis' : `Refinement ${iter.id - 1}`}
                                                    </button>
                                                    {iter.timestamp && <span className="text-[9px] text-slate-500 font-mono">{new Date(iter.timestamp).toLocaleTimeString()}</span>}
                                                </div>
                                                {iter.happiness_score > 0 && <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${iter.happiness_score >= 8 ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}`}>{iter.happiness_score}/10</span>}
                                            </div>
                                            <p className="text-xs text-slate-400">{iter.goal}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="lg:col-span-3 space-y-16">
                                {state.history.map((iter) => (
                                    <div key={iter.id} id={`iter-${iter.id}`} className="space-y-8 relative">
                                        <div className="bg-slate-900 border border-slate-700/50 rounded-xl overflow-hidden shadow-lg p-6 md:p-8 space-y-6">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <h2 className="font-bold text-slate-500 text-[10px] uppercase tracking-widest mb-2">Iteration {iter.id} Goal {iter.target_route && <span className="ml-2 font-mono text-fuchsia-400 bg-fuchsia-500/10 px-2 py-0.5 rounded tracking-normal normal-case">{iter.target_route}</span>}</h2>
                                                    <p className="text-lg md:text-xl text-blue-50 font-medium leading-relaxed whitespace-pre-wrap">{iter.goal}</p>
                                                </div>
                                                <div className="flex flex-col items-end gap-2">
                                                    {iter.timestamp && <span className="text-xs text-slate-500 font-mono">{new Date(iter.timestamp).toLocaleTimeString()}</span>}
                                                    {iter.git_commit && <a href={`#`} className="text-[10px] bg-slate-800 text-slate-400 px-2 py-1 rounded font-mono hover:text-blue-400 transition-colors flex items-center gap-1" title="Git Commit"><span className="text-blue-500 text-[8px]">●</span> {iter.git_commit.substring(0, 7)}</a>}
                                                </div>
                                            </div>
                                            {iter.test_scenario && (
                                                <div className="bg-slate-950/50 rounded-lg p-4 border border-slate-800">
                                                    <h3 className="text-[10px] font-bold text-emerald-500/70 uppercase tracking-widest mb-2 flex items-center gap-2"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>Verification Scenario</h3>
                                                    <p className="text-xs text-slate-300 font-mono leading-relaxed">{iter.test_scenario}</p>
                                                </div>
                                            )}
                                            {iter.negative_history?.length > 0 && (
                                                <div className="pt-2">
                                                    <h3 className="text-[10px] font-bold text-red-400/50 uppercase tracking-widest mb-2">Negative Memory</h3>
                                                    <div className="flex flex-wrap gap-2">{iter.negative_history.map((h, i) => <span key={i} className="text-[9px] bg-red-500/5 border border-red-500/10 text-red-400/60 px-2 py-0.5 rounded break-all">{h}</span>)}</div>
                                                </div>
                                            )}
                                        </div>

                                        {iter.brainstorming_output && (
                                            <div className="bg-transparent border-none">
                                                <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Discovery Internal Monologue</h3>
                                                <div>
                                                    <p className="text-[11px] text-slate-500 font-mono whitespace-pre-wrap leading-relaxed py-1">{iter.brainstorming_output}</p>
                                                </div>
                                            </div>
                                        )}

                                        {((iter.base_seed_paths?.length > 0) || (iter.design_variants_paths?.length > 0) || (iter.theme_variants_paths?.length > 0)) && (
                                            <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg p-6 space-y-8">
                                                <h2 className="font-semibold text-slate-400 text-xs uppercase tracking-widest border-b border-slate-700 pb-2">Design Pipeline (5-5-5 Evolution)</h2>
                                                
                                                {iter.base_seed_paths?.length > 0 && (
                                                    <div className="space-y-4">
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Phase 1: Parallel Discovery Seeds</span>
                                                        <div className="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                                                            {iter.base_seed_paths.map((vPath, idx) => (
                                                                <div key={idx} className="space-y-2">
                                                                    <div onClick={() => vPath && openGallery(iter.base_seed_paths.map(p => `/viewer/public/${p}`), idx)} className={`relative cursor-pointer border rounded-lg overflow-hidden transition-all aspect-video bg-slate-950 flex items-center justify-center p-2 ${iter.design_screenshot_path === vPath ? 'ring-2 ring-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] border-blue-500' : 'border-slate-800 hover:border-slate-600'}`}>
                                                                        {vPath ? <img src={`/viewer/public/${vPath}`} loading="lazy" className="max-w-full max-h-full object-contain" /> : <div className="w-full h-full bg-slate-800 animate-pulse rounded"></div>}
                                                                        {(vPath && iter.design_screenshot_path === vPath) && <div className="absolute top-1 right-1 bg-blue-500 text-white text-[7px] font-bold px-1 rounded shadow-lg">WINNER</div>}
                                                                    </div>
                                                                    <p className="text-[9px] text-slate-500 leading-tight italic">{iter.base_briefs?.[idx] || "Drafting..."}</p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        {iter.design_screenshot_path && (
                                                            <div className="mt-6 border border-slate-800 rounded-xl overflow-hidden shadow-xl bg-slate-950/30">
                                                                <div className="bg-slate-900/50 p-3 border-b border-slate-800/50 flex justify-between items-center">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Winning Seed Preview</span>
                                                                    <span className="bg-blue-500/10 text-blue-400 text-[8px] px-2 py-0.5 rounded font-mono">SELECTED</span>
                                                                </div>
                                                                <img src={`/viewer/public/${iter.design_screenshot_path}`} onClick={() => openGallery(iter.base_seed_paths.map(p => `/viewer/public/${p}`), iter.base_seed_paths.indexOf(iter.design_screenshot_path))} className="w-full h-auto cursor-pointer" />
                                                            </div>
                                                        )}
                                                        {iter.seed_review_critique && (
                                                            <div className="mt-4 p-4 bg-blue-950/10 rounded-lg">
                                                                <h4 className="text-[9px] font-bold text-blue-400/70 uppercase tracking-widest mb-1">Seed Selection Reasoning</h4>
                                                                <p className="text-[10px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap">{iter.seed_review_critique}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {iter.design_variants_paths?.length > 0 && (
                                                    <div className="space-y-4 pt-4 border-t border-slate-800">
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Phase 2: Layout Evolution</span>
                                                        <div className="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                                                            {iter.design_variants_paths.map((vPath, idx) => (
                                                                <div key={idx} onClick={() => openGallery(iter.design_variants_paths.map(p => `/viewer/public/${p}`), idx)} className={`relative cursor-pointer border rounded-lg overflow-hidden transition-all aspect-video bg-slate-950 flex items-center justify-center p-2 ${iter.chosen_design_path === vPath ? 'ring-2 ring-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] border-blue-500' : 'border-slate-800 hover:border-slate-600'}`}>
                                                                    <img src={`/viewer/public/${vPath}`} loading="lazy" className="max-w-full max-h-full object-contain" />
                                                                    {(vPath && iter.chosen_design_path === vPath) && <div className="absolute top-1 right-1 bg-blue-500 text-white text-[7px] font-bold px-1 rounded shadow-lg">WINNER</div>}
                                                                </div>
                                                            ))}
                                                        </div>
                                                        {iter.chosen_design_path && (
                                                            <div className="mt-6 border border-slate-800 rounded-xl overflow-hidden shadow-xl bg-slate-950/30">
                                                                <div className="bg-slate-900/50 p-3 border-b border-slate-800/50 flex justify-between items-center">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Winning Layout Preview</span>
                                                                    <span className="bg-blue-500/10 text-blue-400 text-[8px] px-2 py-0.5 rounded font-mono">SELECTED</span>
                                                                </div>
                                                                <img src={`/viewer/public/${iter.chosen_design_path}`} onClick={() => openGallery(iter.design_variants_paths.map(p => `/viewer/public/${p}`), iter.design_variants_paths.indexOf(iter.chosen_design_path))} className="w-full h-auto cursor-pointer" />
                                                            </div>
                                                        )}
                                                        {iter.layout_review_critique && (
                                                            <div className="mt-4 p-4 bg-blue-950/10 rounded-lg">
                                                                <h4 className="text-[9px] font-bold text-blue-400/70 uppercase tracking-widest mb-1">Layout Selection Reasoning</h4>
                                                                <p className="text-[10px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap">{iter.layout_review_critique}</p>
                                                            </div>
                                                        )}
                                                        {iter.design_review_critique && (
                                                            <div className="mt-4 p-4 bg-orange-950/10 rounded-lg border-l-2 border-orange-500/50">
                                                                <h4 className="text-[9px] font-bold text-orange-400/70 uppercase tracking-widest mb-1">Layout Revision Feedback</h4>
                                                                <p className="text-[10px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap">{iter.design_review_critique}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {iter.theme_variants_paths?.length > 0 && (
                                                    <div className="space-y-4 pt-4 border-t border-slate-800">
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Phase 3: Materiality & Palette</span>
                                                        <div className="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                                                            {iter.theme_variants_paths.map((vPath, idx) => (
                                                                <div key={idx} onClick={() => openGallery(iter.theme_variants_paths.map(p => `/viewer/public/${p}`), idx)} className={`relative cursor-pointer border rounded-lg overflow-hidden transition-all aspect-video bg-slate-950 flex items-center justify-center p-2 ${iter.chosen_theme_path === vPath ? 'ring-2 ring-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)] border-emerald-500' : 'border-slate-800 hover:border-slate-600'}`}>
                                                                    <img src={`/viewer/public/${vPath}`} loading="lazy" className="max-w-full max-h-full object-contain" />
                                                                    {(vPath && iter.chosen_theme_path === vPath) && <div className="absolute top-1 right-1 bg-emerald-500 text-white text-[7px] font-bold px-1 rounded shadow-lg">FINAL VIBE</div>}
                                                                </div>
                                                            ))}
                                                        </div>
                                                        {iter.chosen_theme_path && (
                                                            <div className="mt-6 border border-emerald-500/30 rounded-xl overflow-hidden shadow-xl bg-slate-950/30">
                                                                <div className="bg-emerald-950/10 p-3 border-b border-emerald-500/20 flex justify-between items-center">
                                                                    <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Final Theme Preview</span>
                                                                    <span className="bg-emerald-500 text-white text-[8px] px-2 py-0.5 rounded-full font-bold shadow-lg">FINAL VIBE</span>
                                                                </div>
                                                                <img src={`/viewer/public/${iter.chosen_theme_path}`} onClick={() => openGallery(iter.theme_variants_paths.map(p => `/viewer/public/${p}`), iter.theme_variants_paths.indexOf(iter.chosen_theme_path))} className="w-full h-auto cursor-pointer" />
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {(iter.chosen_theme_path || iter.chosen_design_path) && (
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {/* Phase 1 Winner */}
                                                {iter.design_screenshot_path && (
                                                    <div className="bg-slate-900 border border-slate-700/50 rounded-xl overflow-hidden shadow-lg flex flex-col">
                                                        <div className="p-3 bg-slate-800/50 border-b border-slate-700/50 flex justify-between items-center">
                                                            <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Phase 1: Seed</h3>
                                                            <span className="bg-blue-500/10 text-blue-400 text-[8px] px-2 py-0.5 rounded font-mono">SELECTED</span>
                                                        </div>
                                                        <div className="flex-1 bg-slate-950/30 p-0 flex items-center justify-center">
                                                            <img src={`/viewer/public/${iter.design_screenshot_path}`} onClick={() => openGallery(iter.base_seed_paths.map(p => `/viewer/public/${p}`), iter.base_seed_paths.indexOf(iter.design_screenshot_path))} className="w-full h-auto cursor-pointer" />
                                                        </div>
                                                        {iter.seed_review_critique && (
                                                            <div className="p-3 bg-slate-950/30 border-t border-slate-800/50">
                                                                <p className="text-[9px] text-slate-500 font-mono transition-all">{iter.seed_review_critique}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {/* Phase 2 Winner */}
                                                {iter.chosen_design_path && (
                                                    <div className="bg-slate-900 border border-slate-700/50 rounded-xl overflow-hidden shadow-lg flex flex-col">
                                                        <div className="p-3 bg-slate-800/50 border-b border-slate-700/50 flex justify-between items-center">
                                                            <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Phase 2: Layout</h3>
                                                            <span className="bg-blue-500/10 text-blue-400 text-[8px] px-2 py-0.5 rounded font-mono">SELECTED</span>
                                                        </div>
                                                        <div className="flex-1 bg-slate-950/30 p-0 flex items-center justify-center">
                                                            <img src={`/viewer/public/${iter.chosen_design_path}`} onClick={() => openGallery(iter.design_variants_paths.map(p => `/viewer/public/${p}`), iter.design_variants_paths.indexOf(iter.chosen_design_path))} className="w-full h-auto cursor-pointer" />
                                                        </div>
                                                         {iter.layout_review_critique && (
                                                            <div className="p-3 bg-slate-950/30 border-t border-slate-800/50">
                                                                <p className="text-[9px] text-slate-500 font-mono transition-all">{iter.layout_review_critique}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {/* Phase 3 Winner */}
                                                {iter.chosen_theme_path && (
                                                    <div className="bg-slate-900 border border-emerald-500/30 rounded-xl overflow-hidden shadow-lg flex flex-col relative">
                                                        <div className="absolute top-0 right-0 p-2 z-10"><span className="bg-emerald-500 text-white text-[8px] px-2 py-0.5 rounded-full font-bold shadow-lg">FINAL</span></div>
                                                        <div className="p-3 bg-emerald-950/10 border-b border-emerald-500/20 flex justify-between items-center">
                                                            <h3 className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Phase 3: Theme</h3>
                                                        </div>
                                                        <div className="flex-1 bg-slate-950/30 p-0 flex items-center justify-center">
                                                            <img src={`/viewer/public/${iter.chosen_theme_path}`} onClick={() => openGallery(iter.theme_variants_paths.map(p => `/viewer/public/${p}`), iter.theme_variants_paths.indexOf(iter.chosen_theme_path))} className="w-full h-auto cursor-pointer" />
                                                        </div>
                                                         {iter.theme_review_critique && (
                                                            <div className="p-3 bg-slate-950/30 border-t border-slate-800/50">
                                                                <p className="text-[9px] text-slate-500 font-mono transition-all">{iter.theme_review_critique}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {iter.attempts?.map((att, i) => (
                                            <div key={i} className={`bg-slate-900 border rounded-xl overflow-hidden shadow-lg ${att.score >= 8 ? 'border-emerald-500/30' : 'border-red-500/30'}`}>
                                                <div className={`p-4 flex justify-between items-center ${att.score >= 8 ? 'bg-emerald-950/20' : 'bg-red-950/20'} border-b border-slate-800/50`}>
                                                    <h2 className="font-semibold text-xs uppercase">Attempt {att.attempt_number}</h2>
                                                    <span className="px-2 py-1 rounded text-[10px] font-bold bg-slate-800">Score: {att.score}/10</span>
                                                </div>
                                                {att.prompt_used && (
                                                    <div className="p-4 bg-slate-950/50 border-b border-slate-800">
                                                        <h3 className="text-[9px] font-bold text-blue-400/70 uppercase tracking-widest mb-1">Jules Implementation Brief</h3>
                                                        <p className="text-[10px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap">{att.prompt_used}</p>
                                                    </div>
                                                )}
                                                {att.app_screenshot_path && <img src={`/viewer/public/${att.app_screenshot_path}`} onClick={() => openGallery([`/viewer/public/${att.app_screenshot_path}`])} className="w-full h-auto object-contain border-b border-slate-800 cursor-pointer" style={{maxHeight:'60vh'}} />}
                                                <div className="p-6 space-y-4">
                                                    {att.jules_patch_path && <button onClick={() => togglePatch(att.jules_patch_path)} className="w-full p-2.5 bg-slate-800/40 hover:bg-slate-800/80 transition-colors rounded-lg text-[10px] font-bold text-slate-300 uppercase tracking-widest flex justify-between items-center px-4 border border-slate-700/50"><span>View Code Patch</span> <span className="text-slate-500">{visiblePatches[att.jules_patch_path] ? '▲' : '▼'}</span></button>}
                                                    {visiblePatches[att.jules_patch_path] && <pre className="text-[10px] font-mono bg-[#0d1117] p-4 rounded overflow-x-auto border border-slate-800">{patchContents[att.jules_patch_path]?.split('\n').map((line, i) => {
                                                        let lineClass = 'text-slate-400';
                                                        if (line.startsWith('+') && !line.startsWith('+++')) lineClass = 'text-emerald-400 bg-emerald-500/10';
                                                        else if (line.startsWith('-') && !line.startsWith('---')) lineClass = 'text-red-400 bg-red-500/10';
                                                        else if (line.startsWith('@@')) lineClass = 'text-blue-400 bg-blue-500/10';
                                                        else if (line.startsWith('---') || line.startsWith('+++')) lineClass = 'text-slate-300 font-bold';
                                                        return <div key={i} className={`px-2 -mx-2 ${lineClass}`}>{line}</div>;
                                                    })}</pre>}
                                                    <div><h3 className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Critique</h3><p className="text-xs text-slate-400 font-mono border-l-2 border-slate-700 pl-4">{att.critique}</p></div>
                                                </div>
                                            </div>
                                        ))}

                                        {iter.architectural_critique && (
                                            <div className="bg-slate-900 border border-amber-500/30 rounded-xl overflow-hidden shadow-lg mt-8">
                                                <div className="bg-amber-950/20 p-4 border-b border-amber-500/20 flex justify-between items-center">
                                                    <h3 className="text-[10px] font-bold text-amber-400 uppercase tracking-widest flex items-center gap-2">
                                                        <span className="text-amber-500 text-[12px]">⚖</span> Architectural Review
                                                    </h3>
                                                </div>
                                                <div className="p-6">
                                                    <p className="text-[11px] text-slate-300 font-mono whitespace-pre-wrap leading-relaxed border-l-2 border-amber-500/30 pl-4">{iter.architectural_critique}</p>
                                                </div>
                                            </div>
                                        )}

                                        {iter.id === state.current_iteration && state.active_jules_prompt && (
                                            <div className="bg-slate-950 border border-blue-500/30 rounded-xl overflow-hidden shadow-[0_0_20px_rgba(59,130,246,0.1)]">
                                                <div className="bg-slate-900 px-4 py-2 border-b border-slate-800 flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <div className="spinner border-blue-400 w-3 h-3 border-2"></div>
                                                        <h3 className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">JULES IS CODING</h3>
                                                    </div>
                                                    <a href={state.active_jules_url} target="_blank" className="text-[9px] text-blue-400 hover:text-blue-300 font-mono flex items-center gap-1 bg-blue-500/10 px-2 py-0.5 rounded transition-colors">
                                                        <span>View Console</span>
                                                        <span className="text-[7px]">↗</span>
                                                    </a>
                                                </div>
                                                <div className="p-4 font-mono text-[11px] text-emerald-400 leading-relaxed bg-[#0d1117]">
                                                    <span className="text-slate-500 select-none mr-2">jules$</span>
                                                    <span className="animate-pulse">{state.active_jules_action || "Initializing task..."}</span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>

                    <div className="h-48 shrink-0 bg-[#0a0a0a] border-t border-slate-800 p-6 font-mono text-[11px] overflow-y-auto" onScroll={(e) => isScrolledUpLogs.current = e.target.scrollHeight - e.target.scrollTop - e.target.clientHeight > 50} ref={logContainerRef}>
                        <div className="space-y-1.5 pb-4">
                            {state.live_logs?.map((log, i) => (
                                <div key={i} className={`flex gap-3 leading-relaxed ${log.includes("ERROR") ? "text-red-400" : log.includes("Jules") ? "text-blue-400" : log.includes("Stitch") ? "text-fuchsia-400" : "text-slate-400"}`}>
                                    <span className="text-slate-700 select-none">❯</span>
                                    <span className="break-all">{log}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
