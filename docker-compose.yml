version: '3.8'

services:
  # --- POD ALPHA ---
  loom-alpha:
    build: .
    container_name: loom-alpha
    volumes:
      - ./alpha:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env.alpha
    ports:
      - "8080:8080"
    environment:
      - PB_HOSTNAME=pb-alpha
    restart: unless-stopped
    depends_on:
      - pb-alpha

  pb-alpha:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pb-alpha
    command:
      - serve
      - --http=0.0.0.0:8090
    volumes:
      - ./alpha/pb_data:/pb_data
    ports:
      - "8090:8090"
    restart: unless-stopped

  # --- POD BETA ---
  loom-beta:
    build: .
    container_name: loom-beta
    volumes:
      - ./beta:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env.beta
    ports:
      - "8081:8080"
    environment:
      - PB_HOSTNAME=pb-beta
    restart: unless-stopped
    depends_on:
      - pb-beta

  pb-beta:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pb-beta
    command:
      - serve
      - --http=0.0.0.0:8090
    volumes:
      - ./beta/pb_data:/pb_data
    ports:
      - "8091:8090"
    restart: unless-stopped
