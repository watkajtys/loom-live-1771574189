version: '3.8'

services:
  # The primary instance of Loom
  loom-main:
    build: .
    container_name: loom-main
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - pocketbase

  # PocketBase Backend (The "Data Soul")
  pocketbase:
    image: pocketbase/pocketbase:latest
    container_name: loom-pocketbase
    command:
      - serve
      - --http=0.0.0.0:8090
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
      - ./pb_hooks:/pb_hooks
    ports:
      - "8090:8090"
    restart: unless-stopped
